<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MX Creative Console - Keypad Demo</title>
    <style>
        body {
            font-family: Segoe UI, sans-serif;
            background: radial-gradient(circle at 20% 20%, #333 0%, #202020 45%, #131313 100%);
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            margin: 0;
            letter-spacing: 0.04em;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #535353;
            background: #2a2a2a;
            color: #f0f0f0;
        }

        .app-shell {
            width: min(92vw, 860px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .device-wrap {
            position: relative;
            width: min(92vw, 760px);
            aspect-ratio: 842 / 981;
            user-select: none;
        }

        .device-bg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            border-radius: 24px;
            filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.5));
        }

        .key-overlay {
            position: absolute;
            border: 2px solid transparent;
            border-radius: 8%;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.1s ease, box-shadow 0.1s ease, transform 0.08s ease;
            background: #000;
        }

        .key-overlay:hover {
            border-color: rgba(160, 220, 255, 0.55);
        }

        .key-overlay.pressed {
            border-color: #5ffb67;
            box-shadow: 0 0 12px rgba(95, 251, 103, 0.65);
            transform: scale(0.99);
        }

        .key-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .page-hotspot {
            position: absolute;
            border: 2px solid transparent;
            border-radius: 26%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(230, 230, 230, 0.8);
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            transition: border-color 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
        }

        .page-hotspot.pressed {
            border-color: #5ffb67;
            box-shadow: 0 0 10px rgba(95, 251, 103, 0.6);
            background: rgba(95, 251, 103, 0.18);
            color: #e9ffe5;
        }

        #log {
            font-family: Consolas, monospace;
            color: #d2d2d2;
            text-align: center;
            min-height: 24px;
            background: rgba(0, 0, 0, 0.24);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px 14px;
            width: min(92vw, 720px);
            box-sizing: border-box;
        }

        @media (max-width: 560px) {
            h1 {
                font-size: 1.4rem;
            }

            button {
                width: 100%;
                max-width: 320px;
            }
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <h1>MX Creative Console</h1>
        <button id="connectBtn">Connect Device</button>

        <div class="device-wrap" id="deviceWrap">
            <img class="device-bg" src="../img/mx-keypad.png" alt="MX keypad">
            <div class="page-hotspot" id="key-9"></div>
            <div class="page-hotspot" id="key-10"></div>
        </div>

        <div id="log">Waiting for connection...</div>
    </div>

    <script type="module">
        import { MXCreativeConsoleClient } from '../js/mxCreativeConsole.js';

        const client = new MXCreativeConsoleClient();
        const connectBtn = document.getElementById('connectBtn');
        const deviceWrap = document.getElementById('deviceWrap');
        const logEl = document.getElementById('log');

        // Measured from mx-keypad.png dimensions (842x981) to place overlay tiles.
        const layout = {
            key: { w: 162 / 842, h: 162 / 981 },
            keys: [
                { left: 120 / 842, top: 120 / 981 },
                { left: 334 / 842, top: 120 / 981 },
                { left: 548 / 842, top: 120 / 981 },
                { left: 120 / 842, top: 334 / 981 },
                { left: 334 / 842, top: 334 / 981 },
                { left: 548 / 842, top: 334 / 981 },
                { left: 120 / 842, top: 548 / 981 },
                { left: 334 / 842, top: 548 / 981 },
                { left: 548 / 842, top: 548 / 981 }
            ],
            paging: [
                { left: 120 / 842, top: 775 / 981, w: 183 / 842, h: 95 / 981 },
                { left: 331 / 842, top: 775 / 981, w: 183 / 842, h: 95 / 981 }
            ]
        };

        const controlIdToKeyIndex = new Map([
            [0x0001, 0],
            [0x0002, 1],
            [0x0003, 2],
            [0x0004, 3],
            [0x0005, 4],
            [0x0006, 5],
            [0x0007, 6],
            [0x0008, 7],
            [0x0009, 8],
            [0x01a1, 9],
            [0x01a2, 10]
        ]);

        let connected = false;
        let previousPressed = new Set();
        const keyPreviewUrls = new Map();

        createKeyOverlays();
        positionPagingHotspots();

        window.addEventListener('resize', () => {
            positionPagingHotspots();
        });

        function createKeyOverlays() {
            for (let i = 0; i < 9; i++) {
                const keyRect = layout.keys[i];
                const key = document.createElement('div');
                key.className = 'key-overlay';
                key.id = `key-${i}`;
                key.style.left = `${keyRect.left * 100}%`;
                key.style.top = `${keyRect.top * 100}%`;
                key.style.width = `${layout.key.w * 100}%`;
                key.style.height = `${layout.key.h * 100}%`;
                key.title = `Key ${i + 1}`;

                const preview = document.createElement('img');
                preview.className = 'key-preview';
                preview.alt = `Key ${i + 1} image`;
                preview.id = `preview-${i}`;
                key.appendChild(preview);

                key.addEventListener('click', () => {
                    if (!connected) {
                        return;
                    }
                    updateButtonImage(i).catch((error) => {
                        setLog(`Image upload error: ${error.message}`);
                    });
                });

                deviceWrap.appendChild(key);
            }
        }

        function positionPagingHotspots() {
            for (let i = 0; i < 2; i++) {
                const rect = layout.paging[i];
                const el = document.getElementById(`key-${9 + i}`);
                el.style.left = `${rect.left * 100}%`;
                el.style.top = `${rect.top * 100}%`;
                el.style.width = `${rect.w * 100}%`;
                el.style.height = `${rect.h * 100}%`;
            }
        }

        for (let i = 0; i < 9; i++) {
            setPreviewToDefault(i, 210);
        }

        function setLog(message) {
            logEl.textContent = message;
        }

        function updatePressedVisuals(currentPressed) {
            for (let i = 0; i <= 10; i++) {
                const el = document.getElementById(`key-${i}`);
                if (!el) {
                    continue;
                }
                el.classList.toggle('pressed', currentPressed.has(i));
            }
        }

        function setPreviewImage(index, blob) {
            const previewEl = document.getElementById(`preview-${index}`);
            if (!previewEl) {
                return;
            }

            const previousUrl = keyPreviewUrls.get(index);
            if (previousUrl) {
                URL.revokeObjectURL(previousUrl);
            }

            const nextUrl = URL.createObjectURL(blob);
            keyPreviewUrls.set(index, nextUrl);
            previewEl.src = nextUrl;
        }

        function setPreviewToDefault(index, hue) {
            const size = 118;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            if (!ctx) {
                return;
            }

            ctx.fillStyle = `hsl(${hue}, 100%, 40%)`;
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(index + 1), size / 2, size / 2);

            canvas.toBlob((blob) => {
                if (!blob) {
                    return;
                }
                setPreviewImage(index, blob);
            }, 'image/jpeg', 0.9);
        }

        client.on('status', ({ message, isError }) => {
            setLog(isError ? `Error: ${message}` : message);
        });

        client.on('keypadKeysChanged', ({ activeControlIds }) => {
            const currentPressed = new Set();
            for (const controlId of activeControlIds) {
                const keyIndex = controlIdToKeyIndex.get(controlId);
                if (keyIndex !== undefined) {
                    currentPressed.add(keyIndex);
                }
            }

            for (const keyIndex of currentPressed) {
                if (!previousPressed.has(keyIndex)) {
                    setLog(`Key Down: ${keyIndex}`);
                    if (keyIndex < 9) {
                        updateButtonImage(keyIndex).catch((error) => {
                            setLog(`Image upload error: ${error.message}`);
                        });
                    }
                }
            }

            for (const keyIndex of previousPressed) {
                if (!currentPressed.has(keyIndex)) {
                    setLog(`Key Up: ${keyIndex}`);
                }
            }

            previousPressed = currentPressed;
            updatePressedVisuals(currentPressed);
        });

        connectBtn.addEventListener('click', async () => {
            try {
                await client.requestDeviceAccessAndScan();
                const devices = client.getAvailableDevices();
                const keypad = devices.find((device) => device.role === 'keypad');

                if (!keypad) {
                    throw new Error('No keypad device found after scan.');
                }

                await client.connectAvailableDevice(keypad.index);
                connected = true;
                connectBtn.disabled = true;
                setLog(`Connected: ${keypad.friendlyName}`);

                for (let i = 0; i < 9; i++) {
                    await updateButtonImage(i, 200);
                }
            } catch (error) {
                setLog(`Connection error: ${error.message}`);
            }
        });

        async function updateButtonImage(index, color = -1) {
            const hue = color >= 0 ? color : Math.random() * 360;
            const size = 118;

            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            if (!ctx) {
                throw new Error('Could not create 2D context.');
            }

            ctx.fillStyle = `hsl(${hue}, 100%, 40%)`;
            ctx.fillRect(0, 0, size, size);

            ctx.fillStyle = 'white';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(index + 1), size / 2, size / 2);

            const blob = await new Promise((resolve, reject) => {
                canvas.toBlob((result) => {
                    if (!result) {
                        reject(new Error('Failed to encode image.'));
                        return;
                    }
                    resolve(result);
                }, 'image/jpeg', 0.9);
            });

            setPreviewImage(index, blob);

            const imageFile = new File([blob], `key-${index + 1}.jpg`, { type: 'image/jpeg' });
            await client.uploadContextualDisplayImage(imageFile, {
                mode: 'single',
                keyNumber: index + 1
            });
        }

        window.addEventListener('beforeunload', () => {
            for (const [, url] of keyPreviewUrls) {
                URL.revokeObjectURL(url);
            }
            keyPreviewUrls.clear();
        });
    </script>
</body>

</html>
